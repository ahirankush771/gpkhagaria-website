<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Government Polytechnic Khagaria — Official</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════ */
:root {
  --ff-head: 'Outfit', sans-serif;
  --ff-mono: 'IBM Plex Mono', monospace;
  --ff-body: 'Outfit', sans-serif;

  --r-sm:  10px;
  --r-md:  16px;
  --r-lg:  24px;
  --r-xl:  32px;

  --nav-h: 64px;
  --max-w: 1180px;
}

[data-theme="dark"] {
  --bg:       #050912;
  --bg2:      #0b1022;
  --bg3:      #111827;
  --surface:  rgba(255,255,255,0.045);
  --border:   rgba(255,255,255,0.07);
  --text:     #e4e9f7;
  --muted:    #6b748f;
  --blue:     #3b82f6;
  --cyan:     #06b6d4;
  --teal:     #14b8a6;
  --orange:   #f97316;
  --gold:     #f59e0b;
  --green:    #22c55e;
  --nav-bg:   rgba(5,9,18,0.92);
  --shadow-c: rgba(59,130,246,0.25);
}

[data-theme="light"] {
  --bg:       #f1f5ff;
  --bg2:      #ffffff;
  --bg3:      #e8eef8;
  --surface:  rgba(255,255,255,0.75);
  --border:   rgba(0,0,0,0.08);
  --text:     #111827;
  --muted:    #6b7280;
  --blue:     #2563eb;
  --cyan:     #0891b2;
  --teal:     #0d9488;
  --orange:   #ea580c;
  --gold:     #d97706;
  --green:    #16a34a;
  --nav-bg:   rgba(241,245,255,0.94);
  --shadow-c: rgba(37,99,235,0.14);
}

/* ═══════════════════════════════════════════════
   RESET + BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ff-body);
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
  transition: background .35s, color .35s;
}

img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
ul { list-style: none; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 2px; }

/* ═══════════════════════════════════════════════
   BACKGROUND MESH
═══════════════════════════════════════════════ */
.bg-mesh {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.bg-mesh::before {
  content: '';
  position: absolute;
  top: -30%;
  left: -20%;
  width: 80%;
  height: 80%;
  background: radial-gradient(ellipse at 40% 40%, rgba(59,130,246,0.12) 0%, transparent 65%);
  animation: float1 18s ease-in-out infinite;
}
.bg-mesh::after {
  content: '';
  position: absolute;
  bottom: -20%;
  right: -10%;
  width: 70%;
  height: 70%;
  background: radial-gradient(ellipse at 60% 60%, rgba(20,184,166,0.09) 0%, transparent 65%);
  animation: float2 22s ease-in-out infinite;
}
@keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-40px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-25px,35px)} }

/* Grid lines */
.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
  opacity: 0.4;
}

/* ═══════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════ */
#nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  z-index: 900;
  background: var(--nav-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  transition: background .35s;
}

.nav-wrap {
  max-width: var(--max-w);
  margin: 0 auto;
  height: 100%;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  margin-right: auto;
}
.logo-emblem {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  display: grid; place-items: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 4px 16px var(--shadow-c);
}
.logo-text { line-height: 1.2; }
.logo-text strong {
  display: block;
  font-family: var(--ff-head);
  font-weight: 800;
  font-size: 14px;
  letter-spacing: -0.3px;
}
.logo-text span {
  display: block;
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2px;
}
.nav-links a {
  font-size: 13px;
  color: var(--muted);
  padding: 6px 12px;
  border-radius: 8px;
  transition: color .2s, background .2s;
  white-space: nowrap;
  font-weight: 500;
}
.nav-links a:hover { color: var(--text); background: var(--surface); }
.nav-links a.active { color: var(--blue); background: rgba(59,130,246,0.1); }

.nav-right { display: flex; align-items: center; gap: 8px; }

.icon-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  display: grid; place-items: center;
  font-size: 16px;
  color: var(--muted);
  transition: all .2s;
  flex-shrink: 0;
}
.icon-btn:hover { color: var(--blue); border-color: var(--blue); }

.cta-nav {
  background: linear-gradient(135deg, var(--blue), var(--teal)) !important;
  color: #fff !important;
  font-size: 13px !important;
  font-weight: 600 !important;
  padding: 8px 18px;
  border-radius: 10px;
  transition: opacity .2s, transform .2s;
  white-space: nowrap;
  display: inline-block;
}
.cta-nav:hover { opacity: 0.9; transform: translateY(-1px); }

/* Hamburger */
.ham { flex-direction: column; gap: 4px; padding: 8px; display: none; }
.ham span {
  width: 20px; height: 2px;
  background: var(--muted);
  border-radius: 1px;
  display: block;
  transition: all .3s;
}
.ham.open span:nth-child(1) { transform: rotate(45deg) translate(4px,4px); }
.ham.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.ham.open span:nth-child(3) { transform: rotate(-45deg) translate(4px,-4px); }

/* Mobile drawer */
#mob-nav {
  position: fixed;
  top: var(--nav-h); left: 0; right: 0;
  z-index: 850;
  background: var(--nav-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transform: translateY(-110%);
  transition: transform .35s cubic-bezier(.32,.72,0,1);
}
#mob-nav.open { transform: translateY(0); }
#mob-nav a {
  font-size: 15px;
  color: var(--muted);
  padding: 12px 14px;
  border-radius: 10px;
  font-weight: 500;
  transition: all .2s;
}
#mob-nav a:hover { color: var(--text); background: var(--surface); }
#mob-nav .cta-nav { margin-top: 8px; text-align: center; border-radius: 12px; padding: 12px; }

/* ═══════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════ */
#hero {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: calc(var(--nav-h) + 40px) 20px 60px;
}

.hero-wrap {
  max-width: var(--max-w);
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 420px;
  gap: 48px;
  align-items: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.22);
  border-radius: 100px;
  padding: 5px 14px 5px 8px;
  font-size: 12px;
  color: var(--blue);
  font-weight: 500;
  margin-bottom: 20px;
  font-family: var(--ff-mono);
}
.badge-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 8px var(--teal);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.7); }
}

.hero-h1 {
  font-family: var(--ff-head);
  font-size: clamp(32px, 5.5vw, 60px);
  font-weight: 900;
  line-height: 1.08;
  letter-spacing: -1.5px;
  margin-bottom: 18px;
}
.hero-h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--blue) 0%, var(--teal) 60%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 16px;
  color: var(--muted);
  line-height: 1.7;
  max-width: 500px;
  margin-bottom: 32px;
}

.hero-btns {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  transition: all .22s;
  border: none;
  cursor: pointer;
  font-family: var(--ff-body);
  white-space: nowrap;
}
.btn-grad {
  background: linear-gradient(135deg, var(--blue), var(--teal));
  color: #fff;
  box-shadow: 0 4px 24px var(--shadow-c);
}
.btn-grad:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--shadow-c); }
.btn-ghost {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-ghost:hover { border-color: var(--blue); color: var(--blue); }

/* Hero right panel */
.hero-panel { display: flex; flex-direction: column; gap: 14px; }

.panel-card {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 22px;
}

.panel-label {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.stat-box {
  background: var(--bg3);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-val {
  font-family: var(--ff-head);
  font-size: 28px;
  font-weight: 800;
  color: var(--blue);
  letter-spacing: -1px;
  line-height: 1;
}
.stat-key {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

.ticker-wrap {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  overflow: hidden;
}
.ticker-tag {
  background: var(--orange);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  font-family: var(--ff-mono);
  letter-spacing: 0.5px;
}
.ticker-scroll {
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
}
.ticker-inner {
  display: inline-block;
  font-size: 12px;
  color: var(--muted);
  animation: ticker 25s linear infinite;
}
@keyframes ticker { 0%{transform:translateX(120%)} 100%{transform:translateX(-100%)} }

/* ═══════════════════════════════════════════════
   SECTION COMMONS
═══════════════════════════════════════════════ */
section { position: relative; z-index: 1; }

.sec-pad { padding: 72px 20px; }

.container { max-width: var(--max-w); margin: 0 auto; }

.sec-head { text-align: center; margin-bottom: 48px; }
.sec-chip {
  display: inline-block;
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 100px;
  padding: 4px 14px;
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--blue);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.sec-title {
  font-family: var(--ff-head);
  font-size: clamp(26px, 3.5vw, 40px);
  font-weight: 800;
  letter-spacing: -0.8px;
  line-height: 1.15;
  margin-bottom: 10px;
}
.sec-desc { font-size: 15px; color: var(--muted); max-width: 500px; margin: 0 auto; line-height: 1.65; }

/* ═══════════════════════════════════════════════
   NOTICE BOARD
═══════════════════════════════════════════════ */
#notices { background: linear-gradient(180deg, transparent, rgba(59,130,246,0.03), transparent); }

.notices-layout {
  display: grid;
  grid-template-columns: 1fr 1.35fr;
  gap: 22px;
  align-items: start;
}

.notice-board {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  overflow: hidden;
}
.notice-head {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.notice-head h3 {
  font-family: var(--ff-head);
  font-size: 16px;
  font-weight: 700;
}
.notice-head a {
  font-size: 12px;
  color: var(--blue);
  font-weight: 500;
}
.notice-scroll { max-height: 380px; overflow-y: auto; padding: 8px 0; }
.notice-scroll::-webkit-scrollbar { width: 3px; }
.notice-scroll::-webkit-scrollbar-thumb { background: var(--blue); }

.ni {
  display: flex;
  gap: 14px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  transition: background .2s;
  cursor: pointer;
}
.ni:last-child { border-bottom: none; }
.ni:hover { background: rgba(59,130,246,0.05); }

.ni-date {
  flex-shrink: 0;
  text-align: center;
  width: 44px;
  padding-top: 2px;
}
.ni-date .d {
  font-family: var(--ff-head);
  font-size: 22px;
  font-weight: 800;
  color: var(--blue);
  line-height: 1;
}
.ni-date .m { font-size: 10px; color: var(--muted); text-transform: uppercase; font-family: var(--ff-mono); }

.ni-body h4 { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 3px; }
.ni-body p { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.ni-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--ff-mono);
  letter-spacing: 0.3px;
}
.t-imp  { background: rgba(249,115,22,0.14); color: var(--orange); }
.t-exam { background: rgba(59,130,246,0.14); color: var(--blue); }
.t-evt  { background: rgba(20,184,166,0.14); color: var(--teal); }
.t-new  { background: rgba(34,197,94,0.14);  color: var(--green); }

/* Event highlight card */
.event-hl {
  background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(20,184,166,0.08));
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 30px;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.hl-chip {
  display: inline-block;
  background: var(--teal);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--ff-mono);
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 4px;
  margin-bottom: 16px;
  align-self: flex-start;
}
.event-hl h3 {
  font-family: var(--ff-head);
  font-size: 22px;
  font-weight: 800;
  line-height: 1.25;
  margin-bottom: 12px;
}
.event-hl p { font-size: 14px; color: var(--muted); line-height: 1.65; flex: 1; margin-bottom: 24px; }
.event-metas { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.em { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
.em .ico { font-size: 16px; }

/* ═══════════════════════════════════════════════
   DEPARTMENTS
═══════════════════════════════════════════════ */
#departments {
  background: linear-gradient(135deg, rgba(59,130,246,0.04), rgba(20,184,166,0.04));
}

.dept-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.dept-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 26px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: all .3s;
}
.dept-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, transparent);
  opacity: 0;
  transition: opacity .3s;
}
.dept-card:hover { transform: translateY(-5px); box-shadow: 0 16px 48px rgba(0,0,0,0.25), 0 0 0 1px var(--blue); }
.dept-card:hover::after { opacity: 1; }

.dept-stripe {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 3px 3px 0 0;
}
.s-cse   { background: linear-gradient(90deg, var(--blue), var(--cyan)); }
.s-mech  { background: linear-gradient(90deg, var(--orange), var(--gold)); }
.s-civil { background: linear-gradient(90deg, var(--teal), var(--blue)); }
.s-elec  { background: linear-gradient(90deg, var(--gold), var(--orange)); }
.s-elex  { background: linear-gradient(90deg, #a78bfa, var(--blue)); }
.s-sci   { background: linear-gradient(90deg, var(--teal), #a78bfa); }

.dept-icon { font-size: 36px; margin-bottom: 14px; display: block; }
.dept-card h3 {
  font-family: var(--ff-head);
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 6px;
}
.dept-card p { font-size: 12px; color: var(--muted); line-height: 1.55; margin-bottom: 16px; }
.dept-foot { display: flex; justify-content: space-between; font-size: 12px; align-items: center; }
.dept-seats { color: var(--muted); }
.dept-seats strong { color: var(--text); }
.dept-arrow {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: rgba(59,130,246,0.1);
  display: grid; place-items: center;
  font-size: 14px;
  transition: background .2s, transform .2s;
}
.dept-card:hover .dept-arrow { background: var(--blue); transform: translate(2px,-2px); }

/* ═══════════════════════════════════════════════
   ACHIEVEMENTS
═══════════════════════════════════════════════ */
#achievements { background: var(--bg2); }

.ach-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}

.ach-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px 20px;
  text-align: center;
  transition: transform .3s, box-shadow .3s;
}
.ach-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.2); }
.ach-ico { font-size: 26px; margin-bottom: 10px; }
.ach-val {
  font-family: var(--ff-head);
  font-size: 40px;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.ach-lbl { font-size: 12px; color: var(--muted); }

/* ═══════════════════════════════════════════════
   FACILITIES
═══════════════════════════════════════════════ */
.fac-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.fac-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 24px 18px;
  text-align: center;
  transition: all .3s;
}
.fac-card:hover {
  border-color: var(--teal);
  box-shadow: 0 8px 28px rgba(20,184,166,0.15);
